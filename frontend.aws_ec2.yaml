plugin: amazon.aws.aws_ec2

regions:
- us-east-1

hostnames:
  # This option allows displaying the public ip addresses.
  - private-ip-address

filters:
  # This selects only running instances with tag `Environment` tag set to `dev`.
  tag:Name: frontend
  instance-state-name : running
keyed_groups:
  - key: tags.Name
    separator: ''